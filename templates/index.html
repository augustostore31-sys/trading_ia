<!DOCTYPE html>
<html>
<head>
    <title>Trading AI PRO</title>
    <style>
        body {
            background: #0b132b;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        .card {
            background: #1c2541;
            padding: 20px;
            margin: 20px;
            display: inline-block;
            border-radius: 10px;
            width: 200px;
        }
    </style>
</head>
<body>

<h1>🚀 Trading AI PRO</h1>
<p>Actualizado: {{ time }}</p>

<form method="GET">
    <input name="symbol" value="{{ symbol }}">
    <button type="submit">Actualizar</button>
</form>

<div class="card">
    <h2>15m</h2>
    <p>{{ signal_15m }}</p>
    <p>RSI: {{ rsi_15m }} 📊</p>
</div>

<div class="card">
    <h2>1h</h2>
    <p>{{ signal_1h }}</p>
    <p>RSI: {{ rsi_1h }} 📊</p>
</div>

</body>
</html>
</body>
</html>
