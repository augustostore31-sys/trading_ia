<!DOCTYPE html>
<html>
<head>
    <title>Trading IA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .box {
            background: #1c1c1c;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        select {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        .buy { color: lime; }
        .sell { color: red; }
        .wait { color: orange; }
    </style>
</head>

<body>

    <h1>📊 Trading IA</h1>

    <div class="box">
        <h2>{{ symbol }}</h2>

        <!-- 🔥 AÑADIDO (selector timeframe) -->
        <select id="timeframe" onchange="changeTF()">
            <option value="1m" {% if timeframe == "1m" %}selected{% endif %}>1m</option>
            <option value="5m" {% if timeframe == "5m" %}selected{% endif %}>5m</option>
            <option value="15m" {% if timeframe == "15m" %}selected{% endif %}>15m</option>
            <option value="30m" {% if timeframe == "30m" %}selected{% endif %}>30m</option>
            <option value="1h" {% if timeframe == "1h" %}selected{% endif %}>1h</option>
            <option value="4h" {% if timeframe == "4h" %}selected{% endif %}>4h</option>
        </select>

        <h1 class="{{ result.signal | lower }}">
            {{ result.signal }}
        </h1>

        <p>RSI: {{ result.rsi }}</p>

        <p>Inicio: {{ start_time }}</p>
        <p>Fin: {{ end_time }}</p>
    </div>

    <!-- 🔥 AÑADIDO (JS para cambiar timeframe) -->
    <script>
        function changeTF() {
            const tf = document.getElementById("timeframe").value;
            window.location.href = `/?tf=${tf}`;
        }
    </script>

</body>
</html>
