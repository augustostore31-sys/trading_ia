<!DOCTYPE html>
<html>
<head>
    <title>Trading AI PRO</title>
    <style>
        body {
            background: #0b1220;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        .box {
            display: inline-block;
            margin: 20px;
            padding: 20px;
            background: #1c2333;
            border-radius: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🚀 Trading AI PRO</h1>

    <p>Actualizado: {{ time }}</p>

    <form method="GET">
        <input name="symbol" value="{{ symbol }}">
        <button type="submit">Actualizar</button>
    </form>

    <div class="box">
        <h2>15m</h2>
        <p>{{ res_15m.signal }}</p>
        <p>RSI: {{ res_15m.rsi }} 📊</p>
    </div>

    <div class="box">
        <h2>1h</h2>
        <p>{{ res_1h.signal }}</p>
        <p>RSI: {{ res_1h.rsi }} 📊</p>
    </div>

</body>
</html>
